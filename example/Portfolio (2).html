<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Wilson Gomez — Portfolio</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23070912'/><rect x='3' y='3' width='26' height='26' rx='4' fill='none' stroke='%235b8def' stroke-opacity='0.35'/><circle cx='16' cy='16' r='6' fill='%235b8def'/><circle cx='16' cy='16' r='10' fill='none' stroke='%235b8def' stroke-opacity='0.5'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070912;
  --bg-1: #0b0e1a;
  --bg-2: #0f1322;
  --line: rgba(255,255,255,0.07);
  --line-2: rgba(255,255,255,0.12);
  --ink: #ece8dc;
  --ink-1: #c8c3b3;
  --ink-2: #8a8678;
  --ink-3: #5a574e;
  --accent: #5b8def;
  --accent-soft: rgba(91, 141, 239, 0.18);
  --secondary: #a8c7ff;
  --ok: #7fc7a8;
  --warn: #f0b56b;
  --bad: #f47272;
  --ff-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --ff-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --ff-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --radius: 14px;
  --gap: 14px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--ff-body);
  font-size: 13px;
  letter-spacing: 0.01em;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  /* radial cool glow toward top */
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(91, 141, 239, 0.10), transparent 60%),
    radial-gradient(700px 500px at 10% 110%, rgba(168, 199, 255, 0.06), transparent 60%);
}

/* ─── Atmosphere layers ─────────────────────────────────────────────── */
.atm-root { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.atm-stars { position: absolute; inset: 0; width: 100%; height: 100%; }
.atm-pcb { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.55; mix-blend-mode: screen; }
.atm-scan {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.012) 0 1px,
    transparent 1px 3px
  );
  mix-blend-mode: overlay;
}
.atm-scan::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.025) 50%, transparent 100%);
  animation: scanRoll 9s linear infinite;
}
.atm-vignette {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(120% 80% at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);
}
@keyframes scanRoll { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
@keyframes pcbPulse {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* ─── Layout ────────────────────────────────────────────────────────── */
.app {
  position: relative; z-index: 1;
  min-height: 100vh;
  padding: 28px 32px 80px;
  max-width: 1480px; margin: 0 auto;
}

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--ff-mono); font-size: 11px;
  color: var(--ink-2);
  margin-bottom: 22px;
}
.topbar .tb-l, .topbar .tb-r { display: flex; align-items: center; gap: 14px; }
.tb-led {
  display: inline-flex; align-items: center; gap: 6px;
}
.tb-led::before {
  content: ""; width: 6px; height: 6px; border-radius: 999px;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
  animation: pulse 2.4s ease-in-out infinite;
}
.tb-brand { color: var(--ink); font-weight: 500; letter-spacing: 0.06em; }
.tb-sep { opacity: 0.4; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

/* Bento grid */
.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: 120px;
  grid-auto-flow: dense;
  gap: var(--gap);
}

/* Tile chrome */
.tile {
  position: relative;
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01) 40%, rgba(0,0,0,0.15)),
    rgba(15, 19, 34, 0.55);
  border: 1px solid var(--line);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 1px 0 rgba(0,0,0,0.4),
    0 12px 32px rgba(0,0,0,0.35);
  backdrop-filter: blur(10px) saturate(115%);
  -webkit-backdrop-filter: blur(10px) saturate(115%);
  overflow: hidden;
  transition: transform 220ms cubic-bezier(.2,.7,.2,1),
              box-shadow 220ms cubic-bezier(.2,.7,.2,1),
              border-color 220ms;
  display: flex; flex-direction: column;
}
.tile::before {
  /* corner crosshair */
  content: ""; position: absolute; left: 8px; top: 8px;
  width: 10px; height: 10px;
  border-top: 1px solid var(--line-2); border-left: 1px solid var(--line-2);
  pointer-events: none; opacity: 0.6;
}
.tile::after {
  content: ""; position: absolute; right: 8px; bottom: 8px;
  width: 10px; height: 10px;
  border-bottom: 1px solid var(--line-2); border-right: 1px solid var(--line-2);
  pointer-events: none; opacity: 0.6;
}
.tile.is-hover {
  transform: translateY(-3px);
  border-color: var(--line-2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 1px 0 rgba(0,0,0,0.4),
    0 22px 44px rgba(0,0,0,0.5),
    0 0 0 1px rgba(91,141,239,0.05),
    0 0 60px rgba(91,141,239,0.07);
}
.tile.is-drag { opacity: 0.4; }
.tile.is-over { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 22px 44px rgba(0,0,0,0.5); }

.tile-body { position: relative; padding: 16px 18px; flex: 1; min-height: 0; display: flex; flex-direction: column; }
.tile-handle {
  position: absolute; top: 8px; right: 10px; z-index: 3;
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--ink-3); cursor: grab; user-select: none;
  padding: 2px 6px; border-radius: 4px;
}
.tile-handle:active { cursor: grabbing; }
.tile-handle:hover { color: var(--ink-1); background: rgba(255,255,255,0.04); }

/* Tile spans (default; overridden per tile) */
.t-hero    { grid-column: span 7; grid-row: span 3; }
.t-status  { grid-column: span 3; grid-row: span 3; }
.t-avatar  { grid-column: span 2; grid-row: span 3; }
.t-current { grid-column: span 6; grid-row: span 2; }
.t-heatmap { grid-column: span 6; grid-row: span 2; }
.t-signal  { grid-column: span 12; grid-row: span 1; }
.t-term    { grid-column: span 7; grid-row: span 4; }
.t-skills  { grid-column: span 5; grid-row: span 4; }
.t-prj-1   { grid-column: span 4; grid-row: span 3; }
.t-prj-2   { grid-column: span 4; grid-row: span 3; }
.t-prj-3   { grid-column: span 4; grid-row: span 3; }
.t-experience { grid-column: span 12; grid-row: span 3; }
.t-contact { grid-column: span 12; grid-row: span 2; }

@media (max-width: 1100px) {
  .t-hero { grid-column: span 12; }
  .t-status, .t-avatar, .t-current, .t-heatmap { grid-column: span 6; }
  .t-term { grid-column: span 12; grid-row: span 4; }
  .t-skills { grid-column: span 12; grid-row: span 3; }
  .t-prj-1, .t-prj-2, .t-prj-3 { grid-column: span 12; grid-row: span 3; }
  .t-experience { grid-column: span 12; grid-row: span 4; }
}

/* Tile-internal label */
.tile-label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.16em;
  color: var(--ink-2); text-transform: uppercase;
  margin-bottom: 12px;
}
.tile-label-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 999px; box-shadow: 0 0 6px var(--accent); }

/* ─── Hero ──────────────────────────────────────────────────────────── */
.hero { padding: 22px 26px; flex: 1; display: flex; flex-direction: column; gap: 14px; position: relative; }
.hero-grid {
  position: absolute; inset: 0;
  background:
    linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0 / 40px 40px,
    linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0 / 40px 40px;
  mask-image: radial-gradient(80% 70% at 30% 50%, black, transparent 80%);
  -webkit-mask-image: radial-gradient(80% 70% at 30% 50%, black, transparent 80%);
  opacity: 0.5;
}
.hero-top {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--ff-mono); font-size: 10.5px; letter-spacing: 0.14em;
  color: var(--ink-2); position: relative; z-index: 1;
}
.hero-tag { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-1); }
.hero-led { width: 7px; height: 7px; border-radius: 999px; }
.hero-coord { color: var(--ink-2); }
.hero-name {
  font-family: var(--ff-display);
  font-weight: 600;
  font-size: clamp(48px, 5.4vw, 86px);
  letter-spacing: -0.03em;
  line-height: 0.95;
  display: flex; gap: 0.25em; flex-wrap: wrap;
  position: relative; z-index: 1;
}
.hero-name-2 {
  color: transparent;
  -webkit-text-stroke: 1px var(--ink);
  text-stroke: 1px var(--ink);
}
.hero-roles {
  display: flex; flex-wrap: wrap; gap: 0 12px; align-items: baseline;
  font-family: var(--ff-mono); font-size: 12.5px; letter-spacing: 0.04em;
  color: var(--ink-1); position: relative; z-index: 1;
}
.hero-sep { color: var(--ink-3); }
.hero-bio {
  max-width: 56ch; color: var(--ink-1); font-size: 13.5px; line-height: 1.55;
  position: relative; z-index: 1;
  text-wrap: pretty;
}
.hero-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
  background: var(--line); border-top: 1px solid var(--line);
  margin-top: auto; position: relative; z-index: 1;
}
.hcell { padding: 10px 12px; background: rgba(7, 9, 18, 0.6); display: flex; flex-direction: column; gap: 4px; }
.hcell-l { font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: 0.16em; color: var(--ink-3); }
.hcell-v { font-family: var(--ff-display); font-size: 14px; color: var(--ink); font-weight: 500; }

/* ─── Current ───────────────────────────────────────────────────────── */
.cur { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.cur-head .cur-title { font-family: var(--ff-display); font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
.cur-head .cur-sub { color: var(--ink-2); font-size: 12.5px; }
.cur-progress { margin-top: 4px; }
.cur-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
.cur-fill { height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.cur-meta { display: flex; justify-content: space-between; font-family: var(--ff-mono); font-size: 10px; color: var(--ink-2); margin-top: 6px; letter-spacing: 0.1em; }
.cur-log { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; font-family: var(--ff-mono); font-size: 12px; color: var(--ink-1); }
.cur-log li { display: flex; align-items: center; gap: 9px; }
.dot { width: 7px; height: 7px; border-radius: 999px; flex-shrink: 0; }
.dot.ok { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
.dot.wip { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 1.4s ease-in-out infinite; }
.dot.todo { background: transparent; border: 1px solid var(--ink-3); }

/* ─── Skills ────────────────────────────────────────────────────────── */
.sk { padding: 14px 18px; }
.sk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 26px; }
.sk-h { font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: 0.18em; color: var(--ink-3); margin-bottom: 10px; }
.sk-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; margin-bottom: 7px; }
.sk-name { font-size: 12.5px; color: var(--ink-1); }
.sk-meter { display: inline-flex; gap: 2px; }
.sk-tick { width: 7px; height: 5px; border-radius: 1px; background: rgba(255,255,255,0.07); }
.sk-tick.on { background: var(--secondary); box-shadow: 0 0 3px currentColor; }
.sk-val { font-family: var(--ff-mono); font-size: 10px; color: var(--ink-2); min-width: 18px; text-align: right; }

/* ─── Project tile ──────────────────────────────────────────────────── */
.prj { display: flex; flex-direction: column; }
.prj .prj-head { padding: 14px 18px 8px; display: flex; align-items: center; justify-content: space-between; }
.prj-id { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.14em; }
.prj-preview {
  margin: 0 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(7, 9, 18, 0.5);
  aspect-ratio: 2/1;
  overflow: hidden;
}
.prv { width: 100%; height: 100%; display: block; }
.prj-body { padding: 12px 18px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.prj-title { font-family: var(--ff-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.prj-desc { color: var(--ink-1); font-size: 12.5px; line-height: 1.5; text-wrap: pretty; flex: 1; }
.prj-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em;
  padding: 3px 7px; border-radius: 4px;
  background: rgba(255,255,255,0.04); color: var(--ink-1); border: 1px solid var(--line);
}

/* ─── Status ────────────────────────────────────────────────────────── */
.st { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.st-time { display: flex; align-items: baseline; gap: 12px; }
.st-clock { font-family: var(--ff-mono); font-size: 36px; font-weight: 300; letter-spacing: -0.02em; color: var(--ink); }
.st-date { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-2); letter-spacing: 0.1em; }
.st-rows { display: flex; flex-direction: column; gap: 5px; }
.st-row { display: flex; justify-content: space-between; font-family: var(--ff-mono); font-size: 11.5px; }
.st-l { color: var(--ink-3); letter-spacing: 0.12em; }
.st-v { color: var(--ink-1); display: inline-flex; align-items: center; gap: 6px; }

/* ─── Contact ──────────────────────────────────────────────────────── */
.ct { padding: 14px 22px; display: flex; flex-direction: column; gap: 10px; }
.ct-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.ct-row {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px; border: 1px solid var(--line); border-radius: 8px;
  text-decoration: none; color: inherit;
  background: rgba(7, 9, 18, 0.4);
  transition: all 160ms;
}
.ct-row:hover { border-color: var(--line-2); background: rgba(7, 9, 18, 0.6); }
.ct-k { font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: 0.16em; color: var(--ink-3); }
.ct-v { font-family: var(--ff-mono); font-size: 12.5px; color: var(--ink); }
.ct-foot { font-size: 11.5px; color: var(--ink-2); }

/* ─── Signal / Broadcast ───────────────────────────────────────────── */
.sig { padding: 8px 18px 10px; display: flex; align-items: center; gap: 22px; height: 100%; }
.sig .tile-label { margin: 0; flex-shrink: 0; }
.sig-wave { width: 120px; flex-shrink: 0; }
.sig-svg { width: 100%; height: 28px; }
.sig-marquee { flex: 1; overflow: hidden; mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent); }
.sig-track {
  display: inline-flex; gap: 36px; white-space: nowrap;
  animation: marquee 40s linear infinite;
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--ink-1);
  text-transform: uppercase;
}
.sig-item { display: inline-flex; align-items: center; gap: 10px; }
.sig-dot { width: 5px; height: 5px; border-radius: 999px; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* ─── Terminal ─────────────────────────────────────────────────────── */
.term { display: flex; flex-direction: column; flex: 1; min-height: 0; font-family: var(--ff-mono); }
.term-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-bottom: 1px solid var(--line);
  background: rgba(0,0,0,0.25);
  font-size: 10px; color: var(--ink-2); letter-spacing: 0.1em;
}
.term-dot { width: 9px; height: 9px; border-radius: 999px; opacity: 0.55; }
.term-title { margin-left: 6px; }
.term-meta { margin-left: auto; font-size: 9.5px; color: var(--ink-3); }
.term-scroll {
  flex: 1; min-height: 0; overflow-y: auto;
  padding: 12px 16px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  font-size: 12.5px; line-height: 1.55; color: var(--ink-1);
}
.term-scroll::-webkit-scrollbar { width: 6px; }
.term-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
.trow { display: block; }
.trow.th { color: var(--accent); font-size: 10px; letter-spacing: 0.18em; margin: 8px 0 4px; }
.trow.tm { color: var(--ink-2); font-style: italic; }
.trow.te { color: var(--bad); }
.trow.tw { color: var(--secondary); }
.tkv { display: grid; grid-template-columns: 130px 1fr; }
.tk { color: var(--accent); }
.tv { color: var(--ink-1); }
.tblock { margin: 4px 0 10px; white-space: pre-wrap; color: var(--ink-1); font-family: var(--ff-mono); font-size: 12.5px; }
.tproj { padding: 6px 0; border-top: 1px dashed var(--line); }
.tproj:first-of-type { border-top: 0; }
.tpi { font-size: 11px; }
.tpn { color: var(--ink); font-weight: 500; margin-left: 6px; }
.tpt { color: var(--ink-3); margin-left: 6px; font-size: 11px; }
.tpd { color: var(--ink-2); font-size: 12px; margin-top: 2px; padding-left: 36px; }
.taction {
  margin: 6px 0; padding: 4px 10px; font-family: var(--ff-mono); font-size: 11px;
  border: 1px solid var(--line-2); background: transparent; color: var(--accent);
  border-radius: 4px; cursor: default;
}
.taction:hover { background: rgba(91, 141, 239, 0.10); }
.term-prompt { display: flex; align-items: center; gap: 0; margin-top: 4px; }
.term-ps { color: var(--accent); }
.term-sep { color: var(--ink-3); }
.term-path { color: var(--secondary); }
.term-input {
  flex: 1; background: transparent; border: 0; outline: 0; color: var(--ink);
  font: inherit; padding: 0; min-width: 0;
}
.term-caret {
  display: inline-block; width: 7px; height: 14px; background: var(--accent);
  animation: blink 1s steps(2) infinite;
  margin-left: -7px; pointer-events: none;
}
.term-cmd { color: var(--ink); }
.term-stamp { color: var(--ink-3); font-size: 10.5px; }
@keyframes blink { 50% { opacity: 0; } }

/* ─── Footer ───────────────────────────────────────────────────────── */
.footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 22px; padding-top: 14px;
  border-top: 1px solid var(--line);
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.14em;
  color: var(--ink-3);
}

/* ─── Heatmap ────────────────────────────────────────────────────── */
.hm { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
.hm-grid {
  display: grid;
  grid-template-columns: repeat(26, 1fr);
  grid-template-rows: repeat(7, 1fr);
  gap: 3px; flex: 1; min-height: 0;
}
.hm-cell {
  width: 100%; height: 100%;
  border-radius: 2px;
  background: rgba(255,255,255,0.04);
}
.hm-cell.hm-l0 { background: rgba(255,255,255,0.04); }
.hm-cell.hm-l1 { background: color-mix(in oklab, var(--accent) 18%, rgba(255,255,255,0.04)); }
.hm-cell.hm-l2 { background: color-mix(in oklab, var(--accent) 40%, rgba(255,255,255,0.04)); }
.hm-cell.hm-l3 { background: color-mix(in oklab, var(--accent) 70%, rgba(255,255,255,0.04)); box-shadow: 0 0 4px var(--accent-soft); }
.hm-cell.hm-l4 { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.hm-foot { display: flex; justify-content: space-between; align-items: center; font-family: var(--ff-mono); font-size: 10px; color: var(--ink-2); letter-spacing: 0.1em; }
.hm-legend { display: inline-flex; gap: 4px; align-items: center; }
.hm-legend .hm-cell { width: 9px; height: 9px; }

/* ─── Avatar ─────────────────────────────────────────────────────── */
.av { padding: 14px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
.av-frame {
  position: relative; flex: 1; min-height: 0;
  border: 1px solid var(--line); border-radius: 12px;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 6px, transparent 6px 12px),
    rgba(7, 9, 18, 0.5);
  overflow: hidden;
}
.av-frame image-slot { display: block; width: 100%; height: 100%; }
.av-cross { position: absolute; inset: 8px; pointer-events: none; }
.av-cross span {
  position: absolute; width: 12px; height: 12px;
  border-color: rgba(255,255,255,0.35);
}
.av-cross span:nth-child(1) { top: 0; left: 0; border-top: 1px solid; border-left: 1px solid; }
.av-cross span:nth-child(2) { top: 0; right: 0; border-top: 1px solid; border-right: 1px solid; }
.av-cross span:nth-child(3) { bottom: 0; left: 0; border-bottom: 1px solid; border-left: 1px solid; }
.av-cross span:nth-child(4) { bottom: 0; right: 0; border-bottom: 1px solid; border-right: 1px solid; }
.av-foot {
  display: flex; justify-content: space-between;
  font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: 0.14em;
  color: var(--ink-3);
}

/* ─── Project tile foot ───────────────────────────────────────────── */
.prj-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-top: auto;
}
.prj-open {
  background: transparent; border: 1px solid var(--line-2); border-radius: 6px;
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.12em;
  padding: 5px 10px; cursor: pointer; transition: all 160ms;
}
.prj-open:hover { background: var(--accent-soft); }

/* ─── Project modal ───────────────────────────────────────────────── */
.pm-back {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(7, 9, 18, 0.78);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: pmFadeIn 200ms ease-out;
}
@keyframes pmFadeIn { from { opacity: 0; } to { opacity: 1; } }
.pm {
  width: min(1080px, 100%); max-height: 88vh; overflow: hidden;
  border-radius: 16px; border: 1px solid var(--line-2);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04), rgba(7,9,18,0.9));
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(91,141,239,0.06);
  display: flex; flex-direction: column;
  animation: pmIn 240ms cubic-bezier(.2,.7,.2,1);
}
@keyframes pmIn { from { transform: translateY(20px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }
.pm-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px; border-bottom: 1px solid var(--line);
  font-family: var(--ff-mono); font-size: 10.5px; letter-spacing: 0.14em;
}
.pm-bar-l { display: flex; gap: 14px; align-items: center; }
.pm-bar-r { display: flex; gap: 14px; align-items: center; color: var(--ink-2); }
.pm-id { font-weight: 600; }
.pm-kind { color: var(--ink-2); }
.pm-stat { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-1); }
.pm-x {
  appearance: none; background: transparent; border: 1px solid var(--line);
  color: var(--ink-1); width: 28px; height: 28px; border-radius: 6px;
  cursor: pointer; font-size: 13px;
}
.pm-x:hover { background: rgba(255,255,255,0.05); }
.pm-body {
  display: grid; grid-template-columns: 1.05fr 1fr; gap: 0;
  flex: 1; min-height: 0; overflow: auto;
}
.pm-col { padding: 26px 28px; }
.pm-col-l { border-right: 1px solid var(--line); }
.pm-title {
  font-family: var(--ff-display); font-size: 32px; font-weight: 600;
  letter-spacing: -0.02em; margin: 0 0 14px;
}
.pm-blurb { color: var(--ink-1); font-size: 14px; line-height: 1.6; text-wrap: pretty; margin: 0 0 18px; }
.pm-bullets { list-style: none; padding: 0; margin: 0 0 18px; display: flex; flex-direction: column; gap: 8px; }
.pm-bullets li { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; color: var(--ink-1); line-height: 1.5; }
.pm-tick { font-family: var(--ff-mono); font-weight: 600; }
.pm-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.pm-schem {
  background: rgba(7, 9, 18, 0.55);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 16px;
}
.pm-schem-l { font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: 0.18em; color: var(--ink-3); margin-bottom: 10px; }
.schem { width: 100%; height: auto; display: block; }
.pm-metrics {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
}
.pm-met {
  background: rgba(7, 9, 18, 0.55);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
}
.pm-met-l { font-family: var(--ff-mono); font-size: 9.5px; letter-spacing: 0.16em; color: var(--ink-3); }
.pm-met-v { font-family: var(--ff-display); font-size: 18px; color: var(--ink); margin-top: 4px; }

@keyframes dashFlow { to { stroke-dashoffset: -36; } }

/* ─── Shooting stars ─────────────────────────────────────────────── */
.shoots { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.shoot {
  position: absolute; width: 2px; height: 2px;
  background: var(--shoot-color, #fff); border-radius: 999px;
  box-shadow: 0 0 6px var(--shoot-color, #fff);
  animation: shoot linear forwards;
  transform: rotate(35deg);
  transform-origin: left center;
}
.shoot::before {
  content: ""; position: absolute; right: 0; top: 50%;
  width: 80px; height: 1px;
  background: linear-gradient(to left, var(--shoot-color, #fff), transparent);
  transform: translateY(-50%);
}
@keyframes shoot {
  0% { opacity: 0; transform: rotate(35deg) translateX(0); }
  10% { opacity: 1; }
  100% { opacity: 0; transform: rotate(35deg) translateX(60vw); }
}

/* ─── Spotlight ──────────────────────────────────────────────────── */
.spotlight {
  position: fixed; inset: 0; pointer-events: none; z-index: 2;
  background: radial-gradient(220px 220px at var(--mx, 50%) var(--my, 50%),
              color-mix(in oklab, var(--spot) 4%, transparent),
              transparent 70%);
  mix-blend-mode: screen;
}

/* ─── Matrix overlay ─────────────────────────────────────────────── */
.mtx { position: fixed; inset: 0; z-index: 250; background: #050811; }
.mtx canvas { display: block; width: 100%; height: 100%; }
.mtx-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.14em;
  color: rgba(255,255,255,0.55);
}

/* ─── Tilt & flash ───────────────────────────────────────────────── */
.tile { transform-style: preserve-3d; will-change: transform; }
.tile.is-flash {
  animation: flashTile 1.4s ease-out;
}
@keyframes flashTile {
  0%, 100% { box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 1px 0 rgba(0,0,0,0.4),
    0 12px 32px rgba(0,0,0,0.35); }
  30% { box-shadow:
    inset 0 0 0 1px var(--accent),
    0 0 30px var(--accent-soft),
    0 22px 44px rgba(0,0,0,0.5); }
}

/* ─── Overclock mode ─────────────────────────────────────────────── */
body.overclock { animation: ocHue 6s linear infinite; }
@keyframes ocHue { 0%, 100% { filter: none; } 50% { filter: hue-rotate(8deg) saturate(1.05); } }
body.overclock .atm-scan::after { animation-duration: 3s; }
body.overclock .hero-led,
body.overclock .tile-label-dot,
body.overclock .tb-led::before {
  animation: pulse 0.7s ease-in-out infinite;
}
body.overclock .term-caret { animation-duration: 0.4s; }
body.overclock .sig-track { animation-duration: 18s; }
body.overclock .cur-fill::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: ocShine 1.2s linear infinite;
}
.cur-fill { position: relative; overflow: hidden; }
@keyframes ocShine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* ─── Experience timeline ────────────────────────────────────────── */
.ex { padding: 16px 22px; display: flex; flex-direction: column; gap: 14px; position: relative; height: 100%; }
.ex-line {
  position: absolute; left: 110px; top: 60px; bottom: 22px;
  width: 1px; background: linear-gradient(to bottom, var(--accent-soft), var(--line) 30%, var(--line) 70%, transparent);
}
.ex-rows { display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 1; }
.ex-row { display: grid; grid-template-columns: 26px 96px 1fr 140px; align-items: center; gap: 10px; }
.ex-dot {
  width: 9px; height: 9px; border-radius: 999px;
  background: var(--ink-3); margin-left: 78px; justify-self: end;
  border: 2px solid var(--bg);
}
.ex-row.is-now .ex-dot { animation: pulse 2.4s ease-in-out infinite; }
.ex-y { font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-2); letter-spacing: 0.12em; }
.ex-mid { padding-left: 18px; }
.ex-role { font-family: var(--ff-display); font-size: 16px; font-weight: 500; color: var(--ink); letter-spacing: -0.005em; }
.ex-row.is-now .ex-role { color: var(--ink); }
.ex-org { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
.ex-tag {
  justify-self: end;
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.14em;
  color: var(--ink-3); border: 1px solid var(--line);
  padding: 3px 9px; border-radius: 4px; text-align: center;
}
@media (max-width: 1100px) {
  .ex-line { left: 80px; }
  .ex-row { grid-template-columns: 18px 70px 1fr; }
  .ex-tag { display: none; }
  .ex-dot { margin-left: 52px; }
}

/* ─── Modal screenshot slot ──────────────────────────────────────── */
.pm-shot {
  background: rgba(7, 9, 18, 0.55);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 16px;
}
.pm-shot image-slot { border-radius: 8px; overflow: hidden; }

/* ─── Build / CI ────────────────────────────────────────────────── */
.bld {
  padding: 14px 18px; display: grid;
  grid-template-columns: auto 1fr; grid-template-rows: 1fr auto;
  align-items: center; gap: 0 14px; height: 100%; position: relative;
}
.bld-l { display: inline-flex; align-items: center; gap: 9px; }
.bld-led { width: 7px; height: 7px; border-radius: 999px; animation: pulse 2.2s ease-in-out infinite; }
.bld-h { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.18em; color: var(--ink-3); }
.bld-s { font-family: var(--ff-mono); font-size: 12px; letter-spacing: 0.06em; color: var(--ink); }
.bld-r { display: flex; gap: 10px; align-items: baseline; min-width: 0; overflow: hidden; }
.bld-hash { font-family: var(--ff-mono); font-size: 10.5px; letter-spacing: 0.08em; }
.bld-msg {
  font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  animation: bldFade 1.4s ease-out;
}
@keyframes bldFade { from { opacity: 0; transform: translateX(6px); } to { opacity: 1; } }
.bld-bar {
  grid-column: 1 / -1; height: 3px;
  background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden;
  margin-top: 8px;
}
.bld-fill { width: 30%; height: 100%; animation: bldRun 2.6s linear infinite; }
@keyframes bldRun { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }

/* ─── Telemetry ─────────────────────────────────────────────────── */
.tel { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
.tel-grid { display: flex; flex-direction: column; gap: 7px; flex: 1; justify-content: space-evenly; }
.tel-row { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; align-items: center; gap: 3px 8px; }
.tel-l { font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.16em; color: var(--ink-3); grid-row: 1; grid-column: 1; }
.tel-meter { grid-row: 2; grid-column: 1 / -1; display: inline-flex; gap: 2px; }
.tel-tick { flex: 1; height: 6px; border-radius: 1px; background: rgba(255,255,255,0.07); transition: background 200ms; }
.tel-tick.on { box-shadow: 0 0 4px currentColor; }
.tel-v {
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink-1);
  grid-row: 1; grid-column: 2; text-align: right;
}
.tel-u { font-size: 9px; color: var(--ink-3); margin-left: 1px; letter-spacing: 0.05em; }

/* ─── Snake game ─────────────────────────────────────────────────── */
.snk-back {
  position: fixed; inset: 0; z-index: 250;
  background: rgba(7,9,18,0.78); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  animation: pmFadeIn 200ms ease-out;
}
.snk {
  border: 1px solid var(--line-2); border-radius: 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(7,9,18,0.95));
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  padding: 12px;
}
.snk-bar {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--ff-mono); font-size: 11px; letter-spacing: 0.1em;
  color: var(--ink-1); padding: 4px 6px 12px;
}
.snk-bar b { color: var(--ink); font-weight: 600; letter-spacing: 0.04em; }
.snk-sp { flex: 1; }
.snk-x {
  background: transparent; border: 1px solid var(--line); border-radius: 6px;
  color: var(--ink-1); width: 26px; height: 26px; cursor: pointer; font-size: 12px;
}
.snk-stage {
  position: relative; background: rgba(0,0,0,0.4);
  border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
}
.snk-grid { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.snk-seg { position: absolute; border-radius: 2px; transition: background 80ms; }
.snk-food {
  position: absolute; border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,0.5);
  animation: snkPulse 1s ease-in-out infinite;
}
@keyframes snkPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.85); } }
.snk-msg {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: rgba(7,9,18,0.6); backdrop-filter: blur(2px);
  font-family: var(--ff-mono); color: var(--ink); font-size: 22px; letter-spacing: 0.12em;
}
.snk-hint { font-size: 11px; color: var(--ink-2); letter-spacing: 0.1em; }

/* ─── ASCII rover ─────────────────────────────────────────────────── */
.rover-track {
  position: fixed; left: 0; right: 0; bottom: 18px;
  pointer-events: none; z-index: 1; overflow: hidden;
}
.rover {
  font-family: var(--ff-mono); font-size: 11px; line-height: 1.05;
  color: color-mix(in oklab, var(--accent) 70%, transparent);
  text-shadow: 0 0 6px var(--accent-soft);
  margin: 0; padding: 0; white-space: pre;
  position: absolute; left: -120px;
  animation: roverDrive 22s linear forwards;
}
@keyframes roverDrive {
  0%   { transform: translateX(0)       translateY(0); }
  20%  { transform: translateX(20vw)    translateY(-1px); }
  40%  { transform: translateX(40vw)    translateY(0); }
  60%  { transform: translateX(60vw)    translateY(-1px); }
  80%  { transform: translateX(80vw)    translateY(0); }
  100% { transform: translateX(110vw)   translateY(-1px); }
}

/* ─── Reduced motion ──────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
  .atm-scan::after, .sig-track, .rover, .boot, .term-caret { display: none !important; }
}
body.reduce-motion .atm-scan::after,
body.reduce-motion .sig-track,
body.reduce-motion .rover,
body.reduce-motion .shoots,
body.reduce-motion .term-caret { display: none !important; }
body.reduce-motion .tile-label-dot,
body.reduce-motion .hero-led,
body.reduce-motion .dot.wip { animation: none !important; }

/* ─── Print stylesheet ───────────────────────────────────────────── */
@media print {
  @page { margin: 14mm; }
  body {
    background: #fff !important; color: #111 !important;
    font-size: 11pt !important;
  }
  body::before, .atm-root, .shoots, .spotlight, .twk-panel,
  .topbar, .footer, .tile-handle, .rover-track, .boot,
  .term, .pm-back, .mtx, .snk-back, .av-frame image-slot,
  .sig, .signal, .t-signal, .t-status, .t-avatar, .t-heatmap,
  .t-current, .t-term, .t-contact .ct-foot {
    display: none !important;
  }
  .app { padding: 0 !important; max-width: none !important; }
  .bento {
    display: block !important; gap: 0 !important;
  }
  .tile {
    background: #fff !important; border: 1px solid #ccc !important;
    box-shadow: none !important; backdrop-filter: none !important;
    color: #111 !important; page-break-inside: avoid;
    margin-bottom: 10pt !important; transform: none !important;
  }
  .tile::before, .tile::after { display: none !important; }
  .hero-name, .hero-name-2, .pm-title, .prj-title, .ex-role, .cur-title {
    color: #111 !important; -webkit-text-stroke: 0 !important;
  }
  .tile-label, .tile-label-dot,
  .hero-tag, .hero-coord, .hero-strip, .hcell-l, .hcell-v,
  .prj-id, .ct-k, .ct-v, .st-l, .st-v, .ex-y, .ex-org, .ex-tag,
  .prj-chips .chip, .pm-chips .chip {
    color: #333 !important;
  }
  .prj-preview { display: none !important; }
  .prj-foot .prj-open { display: none !important; }
  .hero-bio, .prj-desc, .pm-blurb { color: #222 !important; }
  .ex-dot { background: #444 !important; box-shadow: none !important; }
  .hero-name-2 { -webkit-text-stroke: 0 !important; color: #444 !important; }
  /* Show contact tile minimally */
  .t-contact { display: block !important; }
  .t-contact .ct-row { border-color: #ccc !important; background: transparent !important; }
}

/* Boot overlay */
.boot {
  position: fixed; inset: 0; z-index: 100; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-mono); color: var(--ink-1);
  flex-direction: column; gap: 18px;
  animation: bootFade 1.2s 1.4s forwards;
}
.boot-lines { width: min(440px, 80vw); font-size: 11px; }
.boot-lines div { opacity: 0; animation: bootLine .25s forwards; }
.boot-lines div:nth-child(1) { animation-delay: .05s; }
.boot-lines div:nth-child(2) { animation-delay: .25s; }
.boot-lines div:nth-child(3) { animation-delay: .45s; }
.boot-lines div:nth-child(4) { animation-delay: .65s; }
.boot-lines div:nth-child(5) { animation-delay: .85s; color: var(--accent); }
@keyframes bootLine { to { opacity: 1; } }
@keyframes bootFade { to { opacity: 0; visibility: hidden; } }
</style>
</head>
